{% extends 'auth/layout.html' %}

{% block title %}Inscription{% endblock %}

{% block body %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg border-0" style="border-radius: 15px;">
            <div class="card-body p-5">

                <div class="text-center mb-4">
                    <h2 class="font-weight-bold text-dark">Créer un compte</h2>
                    <p class="text-muted">Rejoignez-nous en quelques secondes</p>
                </div>

                <form method="post" action="/signup">

                    <div class="form-group mb-3">
                        <label class="font-weight-bold text-secondary">Pseudo</label>
                        <div class="input-group shadow-sm">
                            <input type="text" name="login" class="form-control border-left-0 pl-0" required autofocus
                                placeholder="Choisissez un pseudo">
                        </div>
                    </div>

                    <div class="form-group mb-3">
                        <label class="font-weight-bold text-secondary">Nom</label>
                        <div class="input-group shadow-sm">
                            <input type="text" name="nom" class="form-control border-left-0 pl-0" required
                                placeholder="Votre nom complet">
                        </div>
                    </div>

                    <div class="form-group mb-3">
                        <label class="font-weight-bold text-secondary">Email</label>
                        <div class="input-group shadow-sm">
                            <input type="email" name="email" class="form-control border-left-0 pl-0" required
                                placeholder="votre@email.com">
                        </div>
                    </div>

                    <div class="form-group mb-4">
                        <label class="font-weight-bold text-secondary">Mot de passe</label>
                        <div class="input-group shadow-sm">
                            <input type="password" name="password" class="form-control border-left-0 pl-0" required
                                placeholder="Créez un mot de passe">
                        </div>
                    </div>

                    <button class="btn btn-success btn-block btn-lg rounded-pill shadow-sm font-weight-bold w-100"
                        type="submit">
                        Valider l'inscription
                    </button>
                </form>
            </div>
            <div class="card-footer bg-light text-center py-3 border-0" style="border-radius: 0 0 15px 15px;">
                <span class="text-muted">Déjà un compte ?</span> <a href="/login"
                    class="text-success font-weight-bold">Se connecter</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
