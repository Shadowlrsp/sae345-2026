{% extends 'auth/layout.html' %}

{% block title %}Mot de passe oublié{% endblock %}

{% block body %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg border-0" style="border-radius: 15px;">
            <div class="card-body p-5">

                <div class="text-center mb-4">
                    <h2 class="font-weight-bold text-dark">Mot de passe oublié ?</h2>
                    <p class="text-muted">Pas de panique ! Entrez votre adresse email pour recevoir un lien de
                        réinitialisation.</p>
                </div>

                <form method="post" action="/forget-password">

                    <div class="form-group mb-4">
                        <label for="_email" class="font-weight-bold text-secondary">Adresse Email</label>
                        <div class="input-group shadow-sm">
                            <input type="email" name="email" id="_email" class="form-control border-left-0 pl-0"
                                required autofocus placeholder="votre@email.com">
                        </div>
                    </div>

                    <button
                        class="btn btn-info text-white btn-block btn-lg rounded-pill shadow-sm font-weight-bold w-100"
                        type="submit">
                        Envoyer le lien
                    </button>
                </form>

            </div>

            <div class="card-footer bg-light text-center py-3 border-0" style="border-radius: 0 0 15px 15px;">
                <span class="text-muted">Vous vous en souvenez ?</span>
                <a href="/login" class="text-info font-weight-bold">Se connecter</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
